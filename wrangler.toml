name = "navhub"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# KV 命名空间绑定（用于数据同步）
[[kv_namespaces]]
binding = "NAV_KV"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-id"

# D1 数据库绑定（用于访问统计）
[[d1_databases]]
binding = "NAV_DB"
database_name = "navhub-db"
database_id = "your-d1-database-id"

# 环境变量
[vars]
API_SECRET = "your-secret-key"
